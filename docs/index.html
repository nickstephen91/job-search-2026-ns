<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NS · Job Pipeline 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#08090d;--s1:#0c0e14;--s2:#10131b;--s3:#161922;--b1:#1c2030;--b2:#252a3a;--b3:#303548;--t0:#f0f2ff;--t1:#c8ccdf;--t2:#8b90a8;--t3:#52566a;--t4:#2e3248;--green:#4ec98a;--amber:#c8a44a;--blue:#7a94d8}
body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh}
a{color:inherit;text-decoration:none}code{font-family:'DM Mono',monospace}
nav{position:sticky;top:0;z-index:100;background:rgba(8,9,13,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--b1);padding:0 20px;display:flex;align-items:center;gap:14px;height:52px}
.brand{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--t0)}.brand span{color:var(--t3);margin:0 5px}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2.5s infinite;flex-shrink:0}
.pulse-label{font-size:10px;color:var(--t3)}.nav-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.nav-ct{background:var(--s2);border:1px solid var(--b1);padding:3px 10px;border-radius:20px;font-size:11px;color:var(--t2)}
.refresh-btn{background:var(--s2);border:1px solid var(--b1);color:var(--t2);padding:4px 10px;border-radius:5px;cursor:pointer;font-size:11px;font-family:inherit}
.stats-wrap{padding:14px 20px;border-bottom:1px solid var(--b1)}
.stats-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t4);margin-bottom:10px}
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.stat{background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:12px 14px}
.stat-n{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--t0);line-height:1;margin-bottom:4px}
.stat-l{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3)}.stat-s{font-size:9px;color:var(--t4);margin-top:2px}
.fire .stat-n{color:var(--green)}.amber-s .stat-n{color:var(--amber)}
.toolbar{padding:10px 20px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tb-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t4)}
.pg{display:flex;gap:4px}
.pill{background:transparent;border:1px solid var(--b1);color:var(--t3);padding:4px 11px;border-radius:20px;cursor:pointer;font-size:11px;font-family:inherit;font-weight:500;transition:all .15s}
.pill.active{background:var(--s2);border-color:var(--b3);color:var(--t1)}
.tsep{width:1px;height:16px;background:var(--b1)}.sw{margin-left:auto;position:relative}
.sw input{background:var(--s1);border:1px solid var(--b1);color:var(--t1);padding:5px 10px 5px 28px;border-radius:6px;font-size:12px;font-family:inherit;width:190px;outline:none}
.sw input::placeholder{color:var(--t4)}.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--t4);pointer-events:none}
.jlist{padding:16px 20px;max-width:900px;margin:0 auto}
.gh{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--t4);padding:8px 0 10px;border-bottom:1px solid var(--b1);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.gh span{color:var(--t2);font-family:'DM Mono',monospace}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:10px;margin-bottom:10px;overflow:hidden;animation:fadeIn .3s ease both}
.ts{padding:5px 14px;display:flex;align-items:center;gap:8px}.tl{font-size:8px;font-weight:800;letter-spacing:2px;text-transform:uppercase}.tsc{margin-left:auto;font-family:'DM Mono',monospace;font-size:11px}
.cb{padding:12px 14px}.ct{display:flex;align-items:flex-start;gap:12px}.ci{flex:1;min-width:0}
.jt{font-size:15px;font-weight:700;color:var(--t0);margin-bottom:3px;line-height:1.3}.co{font-size:12px;color:var(--t2);margin-bottom:6px}
.me{display:flex;align-items:center;gap:6px;flex-wrap:wrap}.mi{font-size:11px;color:var(--t3)}.ms{color:var(--t4);font-size:10px}.sal{color:var(--green);font-weight:600;font-size:11px}
.ps{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}.tag{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);color:var(--t3);padding:2px 8px;border-radius:3px;font-size:10px}
.cr{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.ring{width:46px;height:46px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;flex-direction:column}
.rn{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;line-height:1}.rd{font-size:7px;color:var(--t4);line-height:1.4}
.vb{background:var(--s2);border:1px solid var(--b2);color:var(--t2);padding:5px 12px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;text-decoration:none;white-space:nowrap;display:inline-block}
.ss{background:var(--s2);border:1px solid var(--b1);color:var(--t3);padding:4px 8px;border-radius:5px;font-size:10px;font-family:inherit;cursor:pointer;outline:none}
.tbtn{background:none;border:none;color:var(--t4);cursor:pointer;font-size:10px;padding:3px 0;margin-top:4px;font-family:inherit}
.kp{border-top:1px solid var(--b1);padding:10px 14px;display:none}.kp.open{display:block}
.kh{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t4);margin-bottom:6px}
.br{display:flex;align-items:center;gap:8px;margin-bottom:4px}.bl{font-size:10px;color:var(--t3);width:60px;flex-shrink:0}
.bt{flex:1;background:var(--b1);border-radius:2px;height:3px;overflow:hidden}.bf{height:3px;border-radius:2px}
.bv{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);width:32px;text-align:right;flex-shrink:0}
.kts{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}.kt{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);color:var(--t3);padding:2px 7px;border-radius:3px;font-size:9px}
.empty{text-align:center;padding:80px 20px}.ei{font-size:32px;margin-bottom:12px;opacity:.4}
.et{font-size:15px;font-weight:600;color:var(--t3);margin-bottom:8px}.es{font-size:12px;line-height:1.8;color:var(--t4)}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;z-index:999}
.spin{width:24px;height:24px;border:2px solid var(--b2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}.lt{font-size:12px;color:var(--t4)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--s3);border:1px solid var(--b2);color:var(--t1);padding:10px 16px;border-radius:8px;font-size:12px;z-index:999;animation:fadeIn .2s ease;pointer-events:none}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){.stats{grid-template-columns:repeat(3,1fr)}.sw input{width:130px}.ct{flex-wrap:wrap}}
</style>
</head>
<body>
<div id="loading"><div class="spin"></div><div class="lt">Loading pipeline...</div></div>
<nav>
  <div class="brand">NS<span>·</span>Job Pipeline 2026</div>
  <div class="pulse"></div><div class="pulse-label">Daily · 6AM ET</div>
  <div class="nav-r">
    <div class="nav-ct"><span id="nav-ct">0</span> roles</div>
    <button class="refresh-btn" onclick="location.reload()">↻ Refresh</button>
  </div>
</nav>
<div class="stats-wrap">
  <div class="stats-lbl">REMOTE USA + ≤60MI STUART FL · DIRECTOR / VP · $100K–$400K</div>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="st-total">—</div><div class="stat-l">Total</div><div class="stat-s">in pipeline</div></div>
    <div class="stat fire"><div class="stat-n" id="st-fire">—</div><div class="stat-l">Must Apply</div><div class="stat-s">score 80+</div></div>
    <div class="stat amber-s"><div class="stat-n" id="st-strong">—</div><div class="stat-l">Strong Match</div><div class="stat-s">score 65–79</div></div>
    <div class="stat"><div class="stat-n" id="st-review">—</div><div class="stat-l">Review</div><div class="stat-s">score 50–64</div></div>
    <div class="stat"><div class="stat-n" id="st-applied">—</div><div class="stat-l">Applied</div><div class="stat-s">tracked</div></div>
    <div class="stat"><div class="stat-n" id="st-remote">—</div><div class="stat-l">Remote</div><div class="stat-s">fully remote</div></div>
  </div>
</div>
<div class="toolbar">
  <div class="tb-lbl">Sort</div>
  <div class="pg" id="sp">
    <button class="pill active" data-sort="score">Score</button>
    <button class="pill" data-sort="date">Date</button>
    <button class="pill" data-sort="worktype">Work Type</button>
    <button class="pill" data-sort="industry">Industry</button>
  </div>
  <div class="tsep"></div>
  <div class="tb-lbl">Filter</div>
  <div class="pg" id="fp">
    <button class="pill active" data-filter="all">All</button>
    <button class="pill" data-filter="new">New</button>
    <button class="pill" data-filter="saved">⭐ Saved</button>
    <button class="pill" data-filter="applied">✅ Applied</button>
    <button class="pill" data-filter="hidden">👎 Hidden</button>
  </div>
  <div class="sw"><span class="si">⌕</span><input type="text" id="sq" placeholder="Search roles..."></div>
</div>
<div class="jlist" id="jlist"></div>
<script>
const PATHS=['/job-search-2026-ns/results/today.json','./results/today.json','results/today.json'];
let jobs=[],statuses={},sortBy='score',filterBy='all',searchQ='';
function loadSt(){try{return JSON.parse(localStorage.getItem('ns26')||'{}')}catch{return{}}}
function saveSt(){try{localStorage.setItem('ns26',JSON.stringify(statuses))}catch{}}
function tierInfo(s){
  if(s>=80)return{label:'MUST APPLY',c:'var(--green)',bg:'rgba(78,201,138,.08)',ring:'var(--green)'};
  if(s>=65)return{label:'STRONG MATCH',c:'var(--blue)',bg:'rgba(122,148,216,.08)',ring:'var(--blue)'};
  if(s>=50)return{label:'WORTH REVIEWING',c:'var(--amber)',bg:'rgba(200,164,74,.08)',ring:'var(--amber)'};
  return{label:'LOW MATCH',c:'var(--t3)',bg:'rgba(255,255,255,.02)',ring:'var(--b3)'};
}
function bc(s){return s>=80?'var(--green)':s>=65?'var(--blue)':s>=50?'var(--amber)':'var(--t4)'}
async function loadData(){
  for(const p of PATHS){try{const r=await fetch(p+'?t='+Date.now());if(!r.ok)continue;const d=await r.json();return d.jobs||[]}catch{continue}}
  return null;
}
function updateStats(){
  document.getElementById('nav-ct').textContent=jobs.length;
  document.getElementById('st-total').textContent=jobs.length;
  document.getElementById('st-fire').textContent=jobs.filter(j=>(j.rank?.total||0)>=80).length;
  document.getElementById('st-strong').textContent=jobs.filter(j=>{const s=j.rank?.total||0;return s>=65&&s<80}).length;
  document.getElementById('st-review').textContent=jobs.filter(j=>{const s=j.rank?.total||0;return s>=50&&s<65}).length;
  document.getElementById('st-applied').textContent=Object.values(statuses).filter(s=>s==='applied').length;
  document.getElementById('st-remote').textContent=jobs.filter(j=>j.workType==='Remote').length;
}
function filtered(){
  let l=[...jobs];
  if(filterBy==='saved')l=l.filter(j=>statuses[j.url]==='saved');
  else if(filterBy==='applied')l=l.filter(j=>statuses[j.url]==='applied');
  else if(filterBy==='hidden')l=l.filter(j=>statuses[j.url]==='hidden');
  else if(filterBy==='new')l=l.filter(j=>!statuses[j.url]);
  if(filterBy!=='hidden')l=l.filter(j=>statuses[j.url]!=='hidden');
  if(searchQ){const q=searchQ.toLowerCase();l=l.filter(j=>(j.title||'').toLowerCase().includes(q)||(j.company||'').toLowerCase().includes(q)||(j.industry||'').toLowerCase().includes(q))}
  l.sort((a,b)=>{
    if(sortBy==='score')return(b.rank?.total||0)-(a.rank?.total||0);
    if(sortBy==='date')return new Date(b.foundDate||0)-new Date(a.foundDate||0);
    if(sortBy==='worktype')return(a.workType||'').localeCompare(b.workType||'');
    if(sortBy==='industry')return(a.industry||'').localeCompare(b.industry||'');
    return 0;
  });
  return l;
}
function cardHtml(job,idx){
  const s=job.rank?.total||0,t=tierInfo(s),kw=job.rank?.breakdown?.keywords||{},mr=kw.matchRate||0,bd=job.rank?.breakdown||{},status=statuses[job.url]||'';
  const wtIcon=job.workType==='Remote'?'🌎':job.workType==='Hybrid'?'🏢':'📍';
  const sal=job.salary&&job.salary!=='Not Listed'?`<span class="sal">💰 ${job.salary}</span>`:'';
  const tags=[job.source,job.industry].filter(Boolean).map(x=>`<span class="tag">${x}</span>`).join('');
  const kwTags=(kw.topMatches||[]).slice(0,6).map(k=>`<span class="kt">${k}</span>`).join('');
  const pid='p'+idx;
  const bars=[{l:'Industry',v:bd.industry?.score||0,m:bd.industry?.max||30},{l:'Title',v:bd.title?.score||0,m:bd.title?.max||25},{l:'Keywords',v:bd.keywords?.score||0,m:bd.keywords?.max||20},{l:'Comp',v:bd.comp?.score||0,m:bd.comp?.max||12}]
    .map(b=>{const p=b.m>0?Math.round((b.v/b.m)*100):0;return`<div class="br"><div class="bl">${b.l}</div><div class="bt"><div class="bf" style="width:${p}%;background:${bc(s)}"></div></div><div class="bv">${b.v}/${b.m}</div></div>`}).join('');
  const eu=encodeURIComponent(job.url||'');
  return`<div class="card" style="animation-delay:${idx*12}ms">
<div class="ts" style="background:${t.bg}"><span class="tl" style="color:${t.c}">${t.label}</span><span class="tsc" style="color:${t.c}">${s}/100</span></div>
<div class="cb"><div class="ct">
<div class="ci">
  <div class="jt">${job.title||'Untitled'}</div>
  <div class="co">${job.company||'Company Not Listed'}</div>
  <div class="me"><span class="mi">${wtIcon} ${job.workType||'Unknown'}</span><span class="ms">·</span><span class="mi">${job.location||'United States'}</span>${sal?`<span class="ms">·</span>${sal}`:''}</div>
  <div class="ps">${tags}</div>
</div>
<div class="cr">
  <div class="ring" style="border-color:${t.ring};background:${t.bg}"><div class="rn" style="color:${t.ring}">${s}</div><div class="rd">/100</div></div>
  <a href="${job.url||'#'}" target="_blank" class="vb">View →</a>
  <select class="ss" onchange="setSt('${eu}',this.value)">
    <option value="" ${!status?'selected':''}>Unreviewed</option>
    <option value="saved" ${status==='saved'?'selected':''}>⭐ Save</option>
    <option value="applied" ${status==='applied'?'selected':''}>✅ Applied</option>
    <option value="hidden" ${status==='hidden'?'selected':''}>👎 Hide</option>
  </select>
</div>
</div>
<button class="tbtn" onclick="toggleP('${pid}',this)">▸ Match &amp; score breakdown</button>
</div>
<div class="kp" id="${pid}">
  <div class="kh">Resume Keyword Match</div>
  <div class="br"><div class="bl">Match</div><div class="bt"><div class="bf" style="width:${mr}%;background:${bc(s)}"></div></div><div class="bv">${mr}%</div></div>
  <div class="kts">${kwTags}</div>
  <div style="height:10px"></div>
  <div class="kh">Score Breakdown</div>${bars}
</div></div>`;
}
function render(){
  const list=filtered(),el=document.getElementById('jlist');
  if(!list.length){el.innerHTML='<div class="empty"><div class="ei">◎</div><div class="et">No roles match</div><div class="es">Try a different filter or wait for the next run.</div></div>';return}
  const groups=[{label:'🔥 Must Apply',min:80,max:100,c:'var(--green)'},{label:'⭐ Strong Match',min:65,max:79,c:'var(--blue)'},{label:'👀 Worth Reviewing',min:50,max:64,c:'var(--amber)'},{label:'📋 Low Match',min:0,max:49,c:'var(--t4)'}];
  let html='',idx=0;
  for(const g of groups){
    const gj=list.filter(j=>{const s=j.rank?.total||0;return s>=g.min&&s<=g.max});
    if(!gj.length)continue;
    html+=`<div class="gh" style="color:${g.c}">${g.label} <span>${gj.length}</span></div>`;
    for(const job of gj)html+=cardHtml(job,idx++);
  }
  el.innerHTML=html;
}
function toggleP(id,btn){const p=document.getElementById(id);p.classList.toggle('open');btn.textContent=p.classList.contains('open')?'▾ Match & score breakdown':'▸ Match & score breakdown'}
function setSt(eu,val){const url=decodeURIComponent(eu);statuses[url]=val;saveSt();updateStats();toast(val==='applied'?'✅ Applied':val==='saved'?'⭐ Saved':val==='hidden'?'👎 Hidden':'Cleared');if(filterBy!=='all')render()}
function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2200)}
document.getElementById('sp').addEventListener('click',e=>{const b=e.target.closest('[data-sort]');if(!b)return;sortBy=b.dataset.sort;document.querySelectorAll('#sp .pill').forEach(p=>p.classList.toggle('active',p===b));render()});
document.getElementById('fp').addEventListener('click',e=>{const b=e.target.closest('[data-filter]');if(!b)return;filterBy=b.dataset.filter;document.querySelectorAll('#fp .pill').forEach(p=>p.classList.toggle('active',p===b));render()});
document.getElementById('sq').addEventListener('input',e=>{searchQ=e.target.value;render()});
async function init(){
  statuses=loadSt();
  const result=await loadData();
  document.getElementById('loading').style.display='none';
  if(result===null){
    document.getElementById('jlist').innerHTML='<div class="empty"><div class="ei">⚠</div><div class="et">Could not load job data</div><div class="es">Go to GitHub Actions → Daily Job Search → Run workflow, then refresh.</div></div>';
    ['st-total','st-fire','st-strong','st-review','st-applied','st-remote','nav-ct'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent='—'});
    return;
  }
  jobs=result;updateStats();render();
}
init();
</script>
</body>
</html>
