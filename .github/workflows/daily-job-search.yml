name: Daily Job Search - Nick Stephen

on:
  schedule:
    - cron: '0 11 * * *'  # 6:00 AM Eastern (UTC-5, adjusted for EST)
  workflow_dispatch:        # Allow manual trigger anytime

jobs:
  search-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # STEP 1: Search all job boards for new listings
      - name: Search for new jobs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/search.js

      # STEP 2: Verify existing tracked jobs are still active, remove filled roles,
      #         and regenerate the master historical spreadsheet
      - name: Verify active jobs & update master spreadsheet
        run: node scripts/verify-and-update-sheet.js

      # STEP 3: Send the daily email digest
      - name: Send email digest
        env:
          GMAIL_USER: ${{ secrets.SENDER_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: node scripts/send-email.js

      # STEP 4: Commit all updated result files back to the repo
      - name: Commit updated results
        run: |
          git stash || true
          git pull --rebase origin main
          git stash pop || true          
          git config --local user.email "action@github.com"
          git config --local user.name "Nick's Job Search Agent"
          cp results/today.json docs/results/today.json          
          git add -A
          git diff --staged --quiet || git commit -m "Daily update $(date +'%Y-%m-%d') — new jobs + verification"
          git push
